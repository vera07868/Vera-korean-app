<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>韓文背單字</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --danger: #ef4444;
      --danger-dark: #b91c1c;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --ok: #16a34a;
      --warn: #f59e0b;
      --shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc 45%, #ecfeff);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: 0.03em;
      text-align: center;
      color: #111827;
    }

    h2, h3 { margin-top: 0; }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(219, 225, 234, 0.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 22px;
      backdrop-filter: blur(10px);
    }

    .tabs, .row, .actions, .filter-row, .checkbox-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tabs { justify-content: center; margin-bottom: 18px; }

    button, select, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
      transition: 0.18s ease;
      font-weight: 650;
    }

    button:hover { transform: translateY(-1px); filter: brightness(0.98); }
    button:active { transform: translateY(0); }

    .primary { background: var(--primary); color: white; }
    .primary:hover { background: var(--primary-dark); }
    .danger { background: var(--danger); color: white; }
    .danger:hover { background: var(--danger-dark); }
    .ghost { background: #eef2ff; color: var(--primary); }
    .tab.active { background: var(--primary); color: white; }

    input, select, textarea {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px 12px;
      background: #fff;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-grid input, .form-grid select { width: 100%; }

    select option { color: #111827; background: #fff; }

    .two-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }

    .field-title {
      display: block;
      font-weight: 800;
      margin-bottom: 6px;
      color: #374151;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .muted { color: var(--muted); font-size: 14px; }

    .mode-list, .checkbox-grid {
      margin: 12px 0;
    }

    .mode-list label, .checkbox-grid label {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
    }

    .mode-list input, .checkbox-grid input { margin-right: 6px; }

    .quiz-panel {
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .progress {
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #06b6d4);
      transition: width 0.25s ease;
    }

    .question-card {
      border-radius: 20px;
      border: 1px dashed #c7d2fe;
      background: #f8faff;
      padding: 26px 18px;
    }

    .pos-badge {
      display: inline-flex;
      background: #eef2ff;
      color: var(--primary-dark);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1.2;
      font-weight: 800;
      word-break: keep-all;
    }

    .answer-input {
      width: min(100%, 520px);
      text-align: center;
      font-size: 22px;
      margin: 0 auto;
    }

    .result {
      min-height: 30px;
      font-size: 18px;
      font-weight: 800;
    }

    .result.ok { color: var(--ok); }
    .result.bad { color: var(--danger); }

    .word-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .word-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      padding: 14px;
    }

    .word-main {
      display: grid;
      gap: 4px;
    }

    .word-ko { font-size: 24px; font-weight: 800; }
    .word-zh { color: var(--muted); }
    .tag-line { font-size: 13px; color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      margin: 3px 4px 3px 0;
      background: #f1f5f9;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }
    .pill.warn { background: #fffbeb; color: #b45309; }
    .pill.ok { background: #ecfdf5; color: #047857; }

    .mini-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .mini-actions button { padding: 8px 12px; font-size: 14px; }

    .backup-box {
      width: 100%;
      min-height: 150px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      body { padding: 14px; }
      .form-grid, .two-grid { grid-template-columns: 1fr; }
      .word-item { grid-template-columns: 1fr; }
      .section-title { align-items: flex-start; flex-direction: column; }
      .tabs { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>韓文背單字</h1>

    <section class="card">
      <div class="section-title">
        <div>
          <h2>新增單字</h2>
          <p class="muted">詞性請從下拉選單選擇。例句與備註分開填寫；若例句空白，系統會自動產生例句。</p>
        </div>
      </div>

      <div class="form-grid">
        <input id="koreanInput" placeholder="韓文，例如：사과" />
        <input id="chineseInput" placeholder="中文，例如：蘋果" />
        <select id="posInput"$1>
          <option value="名詞 (명사)">名詞 (명사)</option>
          <option value="代名詞 (대명사)">代名詞 (대명사)</option>
          <option value="數詞 (수사)">數詞 (수사)</option>
          <option value="動詞 (동사)">動詞 (동사)</option>
          <option value="形容詞 (형용사)">形容詞 (형용사)</option>
          <option value="冠形詞 (관형사)">冠形詞 (관형사)</option>
          <option value="副詞 (부사)">副詞 (부사)</option>
          <option value="感嘆詞 (감탄사)">感嘆詞 (감탄사)</option>
          <option value="助詞 (조사)">助詞 (조사)</option>
          <option value="片語/習慣用語">片語/習慣用語</option>
        </select>
        <input id="categoryInput" placeholder="分類，例如：食物 / 旅遊" />
      </div>
      <div class="two-grid">
        <label>
          <span class="field-title">例句</span>
          <textarea id="exampleInput" placeholder="例句，例如：저는 사과를 좋아해요. 若空白，系統會自動產生例句。"></textarea>
        </label>
        <label>
          <span class="field-title">備註</span>
          <textarea id="noteInput" placeholder="備註可留空，例如：發音提示、用法、容易混淆的地方。"></textarea>
        </label>
      </div>
      <div class="actions" style="margin-top: 12px;">
        <button class="primary" id="saveBtn" type="button">儲存單字</button>
        <button id="generateExampleBtn" class="ghost" type="button">自動產生例句</button>
        <button id="cancelBtn" class="ghost hidden">取消編輯</button>
        <span class="muted" id="saveHint">資料會儲存在此瀏覽器。</span>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <div>
          <h2>測驗設定</h2>
          <p class="muted">可選擇測驗模式、題庫範圍與題數。</p>
        </div>
      </div>

      <h3>1. 測驗模式：</h3>
      <div class="mode-list">
        <label><input type="radio" name="mode" value="zhToKo" checked />中翻韓（輸入韓文）</label>
        <label><input type="radio" name="mode" value="koToZh" />韓翻中（輸入中文）</label>
        <label><input type="radio" name="mode" value="listen" />聽音拼字（聽音拼韓文）</label>
        <label><input type="radio" name="mode" value="mixed" />隨機混合</label>
      </div>

      <h3>2. 題庫範圍與題數設定：</h3>
      <p class="muted">選擇測驗範圍：</p>
      <div class="actions">
        <button class="ghost" id="selectAllCats">全選</button>
        <button class="ghost" id="clearCats">清空</button>
      </div>
      <div class="checkbox-grid" id="categoryChecks"></div>
      <hr style="border:0;border-top:1px solid var(--border);margin:18px 0;" />
      <label>設定題數：
        <input id="questionCount" type="number" min="1" value="10" style="width: 110px;" />
        <span class="muted" id="questionLimit">/ 0</span>
      </label>
      <div class="actions" style="margin-top: 14px;">
        <button class="primary" id="startQuizBtn">開始測驗挑戰</button>
      </div>
    </section>

    <section class="card hidden" id="quizSection">
      <div class="section-title">
        <div>
          <h2>測驗中</h2>
          <p id="quizProgressText" class="muted">進度：1 / 10</p>
        </div>
        <button class="danger" id="endQuizBtn">結束測驗</button>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <div class="quiz-panel">
        <div class="question-card">
          <div class="pos-badge" id="quizPos">詞性</div>
          <div class="question-text" id="questionText">題目內容</div>
        </div>
        <button class="ghost" id="speakBtn">播放發音</button>
        <input class="answer-input" id="answerInput" placeholder="輸入答案後按 Enter" />
        <div class="result" id="resultBox"></div>
        <div class="actions" style="justify-content:center;">
          <button id="prevBtn">⬅ 上一題</button>
          <button class="primary" id="submitBtn">提交答案</button>
          <button id="nextBtn">下一題</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <div>
          <h2>單字庫管理</h2>
          <p class="muted" id="wordCountText">目前 0 個單字</p>
        </div>
      </div>

      <div class="filter-row">
        <select id="categoryFilter"></select>
        <select id="posFilter"></select>
        <input id="searchInput" placeholder="搜尋韓文 / 中文 / 備註" />
        <button class="danger" id="deleteCategoryBtn">刪除分類</button>
      </div>

      <div class="actions" style="margin-top: 14px;">
        <button class="ghost" id="backupBtn">備份複製</button>
        <button class="danger" id="clearDbBtn">清空資料庫</button>
      </div>
      <textarea class="backup-box" id="backupText" placeholder="備份資料會出現在這裡；也可以貼上 JSON 後按「確認匯入」。"></textarea>
      <div class="actions" style="margin-top: 10px;">
        <button class="primary" id="importBtn">確認匯入</button>
      </div>

      <div class="word-list" id="wordList"></div>
    </section>
  </main>

  <script>
    const POS_LIST = [
      "名詞 (명사)",
      "代名詞 (대명사)",
      "數詞 (수사)",
      "動詞 (동사)",
      "形容詞 (형용사)",
      "冠形詞 (관형사)",
      "副詞 (부사)",
      "感嘆詞 (감탄사)",
      "助詞 (조사)",
      "片語/習慣用語"
    ];

    const STORAGE_KEY = "kwords-vocab-v1";

    let words = loadWords();
    let activePos = "all";
    let editingId = null;
    let quiz = null;
    let selectedCatMemory = null;

    const $ = (id) => document.getElementById(id);

    function loadWords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { return JSON.parse(raw); } catch (_) {}
      }
      return [
        { id: crypto.randomUUID(), korean: "사과", chinese: "蘋果", pos: "名詞 (명사)", category: "食物", note: "저는 사과를 좋아해요." },
        { id: crypto.randomUUID(), korean: "가다", chinese: "去", pos: "動詞 (동사)", category: "日常", note: "학교에 가요." },
        { id: crypto.randomUUID(), korean: "예쁘다", chinese: "漂亮", pos: "形容詞 (형용사)", category: "形容", note: "꽃이 예뻐요." }
      ];
    }

    function saveWords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
      renderAll();
    }

    function uniqueCategories() {
      return [...new Set(words.map(w => w.category || "未分類"))].sort((a, b) => a.localeCompare(b, "zh-Hant"));
    }

    function normalize(text) {
      return String(text || "").trim().toLowerCase().replace(/\s+/g, "");
    }

    function init() {
      renderPosTabs();
      renderPosSelects();
      bindEvents();
      renderAll();
    }

    function renderPosTabs() {
      // 已依需求移除上方詞性 tabs，保留此函式避免舊程式呼叫出錯。
    }

    function renderPosSelects() {
      const options = POS_LIST.map(pos => `<option value="${pos}">${pos}</option>`).join("");
      $("posInput").innerHTML = options;
      $("posFilter").innerHTML = `<option value="all">全部詞性</option>${options}`;
      $("posInput").value = POS_LIST[0];
    }

    function renderCategoryControls() {
      const cats = uniqueCategories();
      if (selectedCatMemory === null) {
        selectedCatMemory = [...cats];
      } else {
        selectedCatMemory = selectedCatMemory.filter(cat => cats.includes(cat));
      }

      $("categoryChecks").innerHTML = cats.map(cat => {
        const checked = selectedCatMemory.includes(cat) ? "checked" : "";
        return `<label><input type="checkbox" name="catCheck" value="${escapeHtml(cat)}" ${checked} />${escapeHtml(cat)}</label>`;
      }).join("") || `<span class="muted">尚無分類</span>`;

      document.querySelectorAll("input[name='catCheck']").forEach(input => {
        input.addEventListener("change", () => {
          selectedCatMemory = selectedCategories();
          updateQuestionLimit();
        });
      });

      const currentCategory = $("categoryFilter").value || "all";
      $("categoryFilter").innerHTML = `<option value="all">全部分類</option>` + cats.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join("");
      $("categoryFilter").value = cats.includes(currentCategory) ? currentCategory : "all";
      updateQuestionLimit();
    }

    function renderWordList() {
      const category = $("categoryFilter").value || "all";
      const pos = $("posFilter").value || "all";
      const keyword = normalize($("searchInput").value);

      const filtered = words.filter(w => {
        const byCat = category === "all" || (w.category || "未分類") === category;
        const byPos = pos === "all" || w.pos === pos;
        const text = normalize(`${w.korean}${w.chinese}${w.note || ""}${w.category}${w.example || ""}`);
        const bySearch = !keyword || text.includes(keyword);
        return byCat && byPos && bySearch;
      });

      const dueCount = words.filter(w => isDueToday(w)).length;
      $("wordCountText").textContent = `目前 ${words.length} 個單字｜今日到期 ${dueCount} 個`;

      $("wordList").innerHTML = filtered.map(w => {
        const stats = { ...makeStats(), ...(w.stats || {}) };
        const wrongRate = getWrongRate(w);
        const dueText = isDueToday(w) ? "今日到期" : `下次複習：${new Date(stats.dueAt).toLocaleDateString("zh-TW")}`;
        return `
          <article class="word-item">
            <div class="word-main">
              <div class="word-ko">${escapeHtml(w.korean)}</div>
              <div class="word-zh">${escapeHtml(w.chinese)}</div>
              <div class="tag-line">${escapeHtml(w.pos || "") }｜${escapeHtml(w.category || "未分類")}</div>
              <div class="tag-line">
                <span class="pill ${isDueToday(w) ? "warn" : "ok"}">${dueText}</span>
                <span class="pill">錯題率 ${wrongRate}%</span>
                <span class="pill">答題 ${stats.attempts || 0} 次</span>
              </div>
              ${w.example ? `<div class="muted">例句：${escapeHtml(w.example)}</div>` : ""}
              ${w.note ? `<div class="muted">備註：${escapeHtml(w.note)}</div>` : ""}
            </div>
            <div class="mini-actions">
              <button class="ghost" onclick="speak('${escapeAttr(w.korean)}')">播放</button>
              <button onclick="editWord('${w.id}')">編輯</button>
              <button class="danger" onclick="deleteWord('${w.id}')">刪除</button>
            </div>
          </article>
        `;
      }).join("") || `<p class="muted">目前沒有符合條件的單字。</p>`;
    }

    function renderAll() {
      renderCategoryControls();
      renderWordList();
    }

    function bindEvents() {
      $("saveBtn").addEventListener("click", saveWordFromForm);
      $("generateExampleBtn").addEventListener("click", generateExampleToForm);
      $("cancelBtn").addEventListener("click", resetForm);
      $("categoryFilter").addEventListener("change", renderWordList);
      $("posFilter").addEventListener("change", renderWordList);
      $("searchInput").addEventListener("input", renderWordList);
      $("selectAllCats").addEventListener("click", () => setAllCategoryChecks(true));
      $("clearCats").addEventListener("click", () => setAllCategoryChecks(false));
      $("questionCount").addEventListener("input", updateQuestionLimit);
      $("startQuizBtn").addEventListener("click", startQuiz);
      $("submitBtn").addEventListener("click", submitAnswer);
      $("nextBtn").addEventListener("click", () => moveQuiz(1));
      $("prevBtn").addEventListener("click", () => moveQuiz(-1));
      $("endQuizBtn").addEventListener("click", endQuiz);
      $("speakBtn").addEventListener("click", () => quiz && speak(quiz.items[quiz.index].korean));
      $("answerInput").addEventListener("keydown", e => { if (e.key === "Enter") submitAnswer(); });
      $("backupBtn").addEventListener("click", backupCopy);
      $("importBtn").addEventListener("click", importBackup);
      $("clearDbBtn").addEventListener("click", clearDatabase);
      $("deleteCategoryBtn").addEventListener("click", deleteCurrentCategory);
    }

    function makeStats() {
      return { attempts: 0, wrong: 1, reps: 0, intervalDays: 0, ease: 2.5, dueAt: Date.now(), lastReviewedAt: null };
    }

    function getWrongRate(word) {
      const stats = { ...makeStats(), ...(word.stats || {}) };
      if (!stats.attempts) return 100;
      return Math.round((stats.wrong / stats.attempts) * 100);
    }

    function isDueToday(word) {
      const stats = { ...makeStats(), ...(word.stats || {}) };
      return !stats.dueAt || stats.dueAt <= Date.now();
    }

    function updateWordStats(id, isCorrect) {
      const oneDay = 24 * 60 * 60 * 1000;
      words = words.map(w => {
        if (w.id !== id) return w;
        const stats = { ...makeStats(), ...(w.stats || {}) };
        stats.attempts += 1;
        stats.lastReviewedAt = Date.now();

        if (isCorrect) {
          stats.reps += 1;
          if (stats.reps === 1) stats.intervalDays = 1;
          else if (stats.reps === 2) stats.intervalDays = 3;
          else stats.intervalDays = Math.max(5, Math.round(stats.intervalDays * stats.ease));
          stats.ease = Math.min(3.2, stats.ease + 0.08);
        } else {
          stats.wrong += 1;
          stats.reps = 0;
          stats.intervalDays = 0;
          stats.ease = Math.max(1.3, stats.ease - 0.25);
        }

        stats.dueAt = Date.now() + stats.intervalDays * oneDay;
        return { ...w, stats };
      });
    }

    function makeExample(korean, chinese, pos) {
      if (!korean || !chinese) return "";
      if (pos.includes("動詞")) return `저는 오늘 ${korean}.`;
      if (pos.includes("形容詞")) return `정말 ${korean}.`;
      if (pos.includes("副詞")) return `저는 ${korean} 말해요.`;
      if (pos.includes("感嘆詞")) return `${korean}! 정말 놀랐어요.`;
      if (pos.includes("片語")) return `이 표현은 '${korean}'입니다.`;
      return `저는 ${korean}을/를 좋아해요.`;
    }

    function generateExampleToForm() {
      const korean = $("koreanInput").value.trim();
      const chinese = $("chineseInput").value.trim();
      const pos = $("posInput").value;
      if (!korean || !chinese) {
        alert("請先輸入韓文與中文，才能產生例句。");
        return;
      }
      $("exampleInput").value = makeExample(korean, chinese, pos);
    }

    function showSaveHint(text, ok = false) {
      const el = $("saveHint");
      el.textContent = text;
      el.style.color = ok ? "var(--ok)" : "var(--muted)";
      setTimeout(() => {
        el.textContent = "資料會儲存在此瀏覽器。";
        el.style.color = "var(--muted)";
      }, 2200);
    }

    function saveWordFromForm() {
      const korean = $("koreanInput").value.trim();
      const chinese = $("chineseInput").value.trim();
      const pos = $("posInput").value;
      const category = $("categoryInput").value.trim() || "未分類";
      const example = $("exampleInput").value.trim() || makeExample(korean, chinese, pos);
      const note = $("noteInput").value.trim();

      if (!korean || !chinese) {
        alert("請至少輸入韓文與中文。");
        return;
      }

      if (editingId) {
        words = words.map(w => w.id === editingId ? { ...w, korean, chinese, pos, category, example, note } : w);
        showSaveHint("已更新單字。", true);
      } else {
        words.unshift({ id: crypto.randomUUID(), korean, chinese, pos, category, example, note, stats: makeStats() });
        showSaveHint("已儲存單字，已加入單字庫。", true);
      }

      resetForm(false);
      saveWords();
      renderPosTabs();
    }

    function resetForm(shouldRender = true) {
      editingId = null;
      $("koreanInput").value = "";
      $("chineseInput").value = "";
      $("posInput").value = POS_LIST[0];
      $("categoryInput").value = "";
      $("exampleInput").value = "";
      $("noteInput").value = "";
      $("saveBtn").textContent = "儲存單字";
      $("cancelBtn").classList.add("hidden");
      if (shouldRender) renderAll();
    }

    window.editWord = function(id) {
      const w = words.find(item => item.id === id);
      if (!w) return;
      editingId = id;
      $("koreanInput").value = w.korean;
      $("chineseInput").value = w.chinese;
      $("posInput").value = w.pos;
      $("categoryInput").value = w.category || "未分類";
      $("exampleInput").value = w.example || makeExample(w.korean, w.chinese, w.pos);
      $("noteInput").value = w.note || "";
      $("saveBtn").textContent = "更新單字";
      $("cancelBtn").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.deleteWord = function(id) {
      if (!confirm("確定要刪除這個單字嗎？")) return;
      words = words.filter(w => w.id !== id);
      saveWords();
    };

    function setAllCategoryChecks(checked) {
      document.querySelectorAll("input[name='catCheck']").forEach(input => input.checked = checked);
      selectedCatMemory = selectedCategories();
      updateQuestionLimit();
    }

    function selectedCategories() {
      return [...document.querySelectorAll("input[name='catCheck']:checked")].map(i => i.value);
    }

    function updateQuestionLimit() {
      const cats = selectedCategories();
      const pool = cats.length ? words.filter(w => cats.includes(w.category || "未分類")) : [];
      $("questionLimit").textContent = `/ ${pool.length}`;
      const input = $("questionCount");
      input.max = Math.max(pool.length, 1);
      if (+input.value > pool.length) input.value = pool.length || 1;
    }

    function getMode() {
      return document.querySelector("input[name='mode']:checked").value;
    }

    function startQuiz() {
      const cats = selectedCategories();
      let pool = cats.length ? words.filter(w => cats.includes(w.category || "未分類")) : [];
      if (!pool.length) {
        alert("請先新增單字，並選擇至少一個有單字的分類。");
        return;
      }

      pool = shuffle(pool).slice(0, Math.min(+$("questionCount").value || 1, pool.length));
      quiz = {
        items: pool,
        index: 0,
        mode: getMode(),
        answers: Array(pool.length).fill(null),
        checked: Array(pool.length).fill(false)
      };

      $("quizSection").classList.remove("hidden");
      renderQuizQuestion();
      $("quizSection").scrollIntoView({ behavior: "smooth" });
    }

    function renderQuizQuestion() {
      if (!quiz) return;
      const item = quiz.items[quiz.index];
      const mode = quiz.mode === "mixed" ? ["zhToKo", "koToZh", "listen"][quiz.index % 3] : quiz.mode;
      item.currentMode = mode;

      $("quizProgressText").textContent = `進度：${quiz.index + 1} / ${quiz.items.length}`;
      $("progressBar").style.width = `${((quiz.index + 1) / quiz.items.length) * 100}%`;
      $("quizPos").textContent = item.pos;
      $("questionText").textContent = mode === "zhToKo" ? item.chinese : mode === "koToZh" ? item.korean : "請聽發音後拼出韓文";
      $("speakBtn").classList.toggle("hidden", mode !== "listen");
      $("answerInput").value = quiz.answers[quiz.index] || "";
      $("resultBox").textContent = "";
      $("resultBox").className = "result";
      $("answerInput").focus();
      if (mode === "listen") setTimeout(() => speak(item.korean), 200);
    }

    function submitAnswer() {
      if (!quiz) return;
      const item = quiz.items[quiz.index];
      const userAnswer = $("answerInput").value.trim();
      const correct = item.currentMode === "koToZh" ? item.chinese : item.korean;
      const isCorrect = normalize(userAnswer) === normalize(correct);

      quiz.answers[quiz.index] = userAnswer;
      quiz.checked[quiz.index] = isCorrect;
      updateWordStats(item.id, isCorrect);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
      renderWordList();
      updateQuestionLimit();

      const box = $("resultBox");
      box.className = `result ${isCorrect ? "ok" : "bad"}`;
      box.textContent = isCorrect ? "答對了！" : `答錯了，正確答案：${correct}`;
    }

    function moveQuiz(delta) {
      if (!quiz) return;
      quiz.index = Math.min(Math.max(quiz.index + delta, 0), quiz.items.length - 1);
      renderQuizQuestion();
    }

    function endQuiz() {
      if (!quiz) return;
      const total = quiz.items.length;
      const score = quiz.checked.filter(Boolean).length;
      alert(`測驗結束！答對 ${score} / ${total} 題。`);
      quiz = null;
      $("quizSection").classList.add("hidden");
    }

    function backupCopy() {
      const data = JSON.stringify(words, null, 2);
      $("backupText").value = data;
      navigator.clipboard?.writeText(data).then(() => {
        $("saveHint").textContent = "備份已複製到剪貼簿。";
        setTimeout(() => $("saveHint").textContent = "資料會儲存在此瀏覽器。", 1800);
      });
    }

    function importBackup() {
      try {
        const data = JSON.parse($("backupText").value);
        if (!Array.isArray(data)) throw new Error("格式錯誤");
        words = data.map(w => ({
          id: w.id || crypto.randomUUID(),
          korean: String(w.korean || ""),
          chinese: String(w.chinese || ""),
          pos: POS_LIST.includes(w.pos) ? w.pos : POS_LIST[0],
          category: String(w.category || "未分類"),
          example: String(w.example || w.exampleKo || ""),
          note: String(w.note || ""),
          stats: w.stats || makeStats()
        })).filter(w => w.korean && w.chinese);
        saveWords();
        alert("匯入完成。");
      } catch (err) {
        alert("匯入失敗，請確認內容是正確的 JSON 備份資料。");
      }
    }

    function clearDatabase() {
      if (!confirm("確定要清空全部單字嗎？這個動作無法復原。")) return;
      words = [];
      saveWords();
    }

    function deleteCurrentCategory() {
      const cat = $("categoryFilter").value;
      if (cat === "all") {
        alert("請先在分類篩選中選擇要刪除的分類。");
        return;
      }
      if (!confirm(`確定要刪除「${cat}」分類底下所有單字嗎？`)) return;
      words = words.filter(w => (w.category || "未分類") !== cat);
      saveWords();
    }

    window.speak = function(text) {
      if (!("speechSynthesis" in window)) {
        alert("此瀏覽器不支援語音播放。請使用 Chrome / Edge / Safari。一般 GitHub Pages 可使用，但部分環境可能限制語音。 ");
        return;
      }
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ko-KR";
      utter.rate = 0.85;
      window.speechSynthesis.speak(utter);
    };

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;"
      }[ch]));
    }

    function escapeAttr(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/[\

]/g, " ");
    }

    init();
  </script>
</body>
</html>
